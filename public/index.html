<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MovieToText - YouTube字幕取得ツール</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="top-bar">
      <div class="lang-toggle">
        <button class="lang-btn active" data-lang="ja">日本語</button>
        <button class="lang-btn" data-lang="en">English</button>
      </div>
      <div class="visitor-badge" id="visitor-counter"><span class="counter-drum" id="counter-drum">•••</span></div>
    </div>

    <header>
      <h1>🎬 MovieToText</h1>
      <p class="subtitle" data-i18n="subtitle">YouTube動画の字幕を簡単に取得</p>
    </header>

    <main>
      <div class="input-section">
        <label for="url-input" data-i18n="urlLabel">YouTube URLを入力してください</label>
        <div class="input-row">
          <input
            type="text"
            id="url-input"
            placeholder="https://www.youtube.com/watch?v=..."
            autocomplete="off"
          >
          <button id="paste-btn" type="button" class="icon-btn" title="貼り付け">📋</button>
          <button id="clear-btn" type="button" class="icon-btn" title="クリア">✕</button>
          <button id="fetch-btn" type="button" data-i18n="fetchBtn">字幕を取得</button>
        </div>
      </div>

      <div id="loading" class="loading hidden">
        <div class="spinner"></div>
        <p data-i18n="loadingText">取得中...</p>
      </div>

      <div id="error" class="error hidden"></div>

      <div id="result" class="result hidden">
        <div class="video-info">
          <div class="subtitle-lang-row hidden" id="subtitle-lang-row">
            <label for="subtitle-lang-select" data-i18n="subtitleLang">字幕言語:</label>
            <select id="subtitle-lang-select"></select>
          </div>
          <h2 id="video-title"></h2>
          <div class="meta">
            <span id="video-channel"></span>
          </div>
        </div>

        <div class="transcript-section">
          <div class="tabs">
            <button class="tab active" data-tab="full" data-i18n="tabFull">タイトル+チャンネル+説明+字幕</button>
            <button class="tab" data-tab="textonly" data-i18n="tabTextOnly">字幕のみ</button>
          </div>

          <div id="tab-full" class="tab-content active">
            <div id="full-description" class="full-description"></div>
            <pre id="transcript-text"></pre>
          </div>

          <div id="tab-textonly" class="tab-content">
            <pre id="summary-text"></pre>
          </div>
        </div>

        <div class="export-section">
          <button class="export-btn" data-format="txt">📥 TXT</button>
          <button class="export-btn" data-format="md">📥 Markdown</button>
          <button class="copy-btn" id="copy-btn" data-i18n="copyBtn">📋 クリップボードにコピー</button>
        </div>
      </div>
    </main>

    <footer>
      <p class="note" data-i18n="note2">※ YouTubeの自動生成字幕を使用しています</p>
      <p class="note" data-i18n="note3">※ 一部の動画では字幕が取得できない場合があります</p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
